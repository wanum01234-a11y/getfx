kind = "web"
previewPath = "/legacy-trading-dashboard/"
title = "Trading Dashboard Backup"
version = "1.0.0"
id = "artifacts/trading-dashboard"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/legacy-trading-dashboard/" ]
localPort = 24210

[services.development]
run = "pnpm --filter @workspace/trading-dashboard run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/trading-dashboard", "run", "build" ]
publicDir = "artifacts/trading-dashboard/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "24210"
BASE_PATH = "/legacy-trading-dashboard/"
